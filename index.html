<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디딤 프로젝트</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#111;
  color:#fff;
  font-family:'Noto Sans KR',sans-serif;
  max-width:480px;
  margin:0 auto;
}

/* ── 헤더 ── */
.header {
  background:#28246B;
  padding:30px 20px 22px;
  text-align:center;
}
.header img.main-logo {
  width:240px;
  max-width:80%;
  margin-bottom:14px;
  display:block;
  margin-left:auto;
  margin-right:auto;
}

/* ── 소개 ── */
.intro-section {
  background:#fff;
  color:#222;
  padding:44px 26px 36px;
  text-align:center;
}
.sec-title-black {
  font-family:'Noto Serif KR',serif;
  font-size:22px;
  font-weight:700;
  color:#111;
  margin-bottom:24px;
}
.intro-text {
  font-size:13px;
  color:#555;
  line-height:2;
  text-align:left;
  word-break:keep-all;
}
.intro-cta {
  margin-top:28px;
  font-size:16px;
  font-weight:700;
  color:#111;
  line-height:2.1;
  font-family:'Noto Serif KR',serif;
  text-align:center;
}

/* ── 후원 ── */
.sponsor-wrap {
  background:#1a2040;
  padding:38px 18px 30px;
}
.sec-title-white {
  font-size:16px;
  font-weight:700;
  color:#fff;
  text-align:center;
  margin-bottom:20px;
}

/* 테이블 */
.benefit-table {
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
}
.benefit-table th {
  background:#5a85e0;
  color:#fff;
  padding:12px 8px;
  border:2px solid #2a3868;
  text-align:center;
}
.cell-label, .cell-common, .cell-mid, .cell-top, .cell-dark {
  border:2px solid #2a3868;
  text-align:center;
}
.cell-label { background:#6a9de0; padding:14px; font-size:18px; font-weight:700; }
.cell-common { background:#8ab4f0; padding:16px; }
.cell-mid { background:#8ab4f0; padding:14px; }
.cell-top { background:#8ab4f0; padding:12px; }
.cell-dark { background:#1a2a5a; }

/* 카드 */
.support-box {
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.tier-note {
  font-size:14px;
  color:#333;
  line-height:1.8;
  text-align:center;
}

/* 🔥 카카오 스타일 버튼 */
.kakao-btn {
  display:flex;
  justify-content:center;
  align-items:center;

  width:100%;
  height:58px;
  margin-top:18px;

  background:#FEE500;
  color:#191919;

  font-weight:700;
  font-size:15px;

  border-radius:12px;
  text-decoration:none;

  box-shadow:0 6px 14px rgba(0,0,0,0.15);

  transition:0.2s;
}

.kakao-btn:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 18px rgba(0,0,0,0.18);
}

.kakao-btn:active {
  transform:translateY(1px);
  box-shadow:0 4px 10px rgba(0,0,0,0.12);
}

/* 백일몽 */
.baek-wrap {
  background:#0c0c18;
  padding:44px 24px;
  text-align:center;
}
.baek-body {
  font-size:14px;
  color:#aaa;
  line-height:2.3;
}

/* 사진 */
.photo-wrap {
  background:#fff;
  color:#111;
  padding:38px 20px;
}

/* SNS */
.sns-wrap {
  background:#111;
  padding:16px 20px;
  display:flex;
  gap:20px;
}

/* 후원자 */
.donor-wrap {
  background:#fff;
  color:#111;
  padding:50px 24px;
  text-align:center;
}
</style>
</head>

<body>

<!-- 헤더 -->
<div class="header">
  <img class="main-logo" src="https://raw.githubusercontent.com/ekdud0423/ddimgo/main/%EB%94%94%EB%94%A4%EB%A1%9C%EA%B3%A0%ED%9D%B0.png">
</div>

<!-- 소개 -->
<div class="intro-section">
  <div class="sec-title-black">디딤 프로젝트 소개</div>
  <div class="intro-text">
    D-dim project는 신진 예술가가 다음 단계로 나아가기 위한 프로젝트입니다...
  </div>
</div>

<!-- 후원 -->
<div class="sponsor-wrap">
  <div class="sec-title-white">디딤프로젝트 후원 혜택</div>

  <table class="benefit-table">
    <tr>
      <th>구분</th>
      <th>5만원</th>
      <th>10만원</th>
      <th>20만원</th>
    </tr>

    <tr>
      <td class="cell-label">혜택</td>
      <td class="cell-common" colspan="3">
        이름 등록 / 기념품 / 안내 방송 / 촬영
      </td>
    </tr>

    <tr>
      <td class="cell-dark"></td>
      <td class="cell-dark"></td>
      <td class="cell-mid" colspan="2">티켓 50% 할인</td>
    </tr>

    <tr>
      <td class="cell-dark"></td>
      <td class="cell-dark"></td>
      <td class="cell-dark"></td>
      <td class="cell-top">리딩 워크숍 초대</td>
    </tr>
  </table>

  <!-- 🔥 카드 + 버튼 -->
  <div class="support-box">

    <div class="tier-note">
      토스뱅크 1002-4334-5444<br>
      예금주: 이다영<br><br>
      입금 후 반드시 폼 작성 부탁드립니다.
    </div>

    <a href="https://naver.me/GNJvjI2A" target="_blank" class="kakao-btn">
      후원자 정보 등록하기
    </a>

  </div>
</div>

<!-- 백일몽 -->
<div class="baek-wrap">
  <div class="baek-body">
    극단 백일몽은 꿈과 현실 사이를 무대에 올립니다.
  </div>
</div>

<!-- SNS -->
<div class="sns-wrap">
  <a href="#" style="color:#ccc;">Instagram</a>
  <a href="#" style="color:#ccc;">YouTube</a>
</div>

<!-- 후원자 -->
<div class="donor-wrap">
  후원자 명단
</div>

</body>
</html>
